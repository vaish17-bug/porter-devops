steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install Dependencies
    run: |
      cd services/user-service
      npm install

      cd ../booking-service
      npm install

      cd ../driver-service
      npm install

      cd ../tracking-service
      npm install

      cd ../notification-service
      npm install

      cd ../../frontend
      npm install

  # 👇 ADD THIS PART HERE
  - name: Run Tests
    run: |
      cd services/user-service && npm test || true
      cd ../booking-service && npm test || true

  - name: Build Frontend
    run: |
      cd frontend
      npm run build

  - name: Finish
    run: echo "Pipeline completed"
  - name: Build Docker Images
    run: docker compose build